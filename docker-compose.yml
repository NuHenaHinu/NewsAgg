services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${SERVER_HOST_PORT:-3000}:3000"
    env_file:
      - ./server/.env
      - ./server/.hf.env
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:3000}"
    ports:
      - "8080:80"
    depends_on:
      - server
    environment:
      NODE_ENV: production
    restart: unless-stopped