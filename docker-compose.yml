services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    # 直接在 environment 裡寫死地址，確保連線成功
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "postgresql://neondb_owner:npg_XOkmBjpty5z3@ep-silent-brook-aob7c55q.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require"
      NEON_DSN: "postgresql://neondb_owner:npg_XOkmBjpty5z3@ep-silent-brook-aob7c55q.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require"
      API_KEY: "" # 先留空，拿到後再填入
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server
    environment:
      NODE_ENV: production
    restart: unless-stopped